name: wedding_card_app
description: "Gujarati Wedding Kankotri App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.1

  # 🔥 UI & CORE
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  google_sign_in: ^6.2.1
  flutter_web_auth_2: ^4.0.0

  # 📄 PDF
  pdf: ^3.12.0
  printing: ^5.14.3

  # 📱 CONTACTS & IMPORT
  flutter_contacts: ^1.1.7
  permission_handler: ^11.3.1
  file_picker: 8.3.7
  device_info_plus: ^10.1.0

  # 📊 DATA
  csv: ^6.0.0
  uuid: ^4.4.0

  # 📤 SHARE & LINKS
  share_plus: ^10.0.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.2.2

  # 📁 STORAGE
  path_provider: ^2.1.2
  open_file: ^3.3.2

  # 🧠 LOCAL DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.5+1
  flutter_svg: ^2.2.4
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3

  # 🔥 FIREBASE
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 🔥 CODE GENERATION
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

  # ✅ COMPATIBLE ANALYZER
  analyzer: ^6.4.1

  # 🔥 LAUNCHER ICONS
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/invitation_logo.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

